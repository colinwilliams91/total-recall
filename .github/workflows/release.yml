name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install git-cliff
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64)  TRIPLE="x86_64-unknown-linux-musl" ;;
            aarch64) TRIPLE="aarch64-unknown-linux-musl" ;;
            *) echo "::error::unsupported arch: $(uname -m)"; exit 1 ;;
          esac
          TAG=$(curl -sL https://api.github.com/repos/orhun/git-cliff/releases/latest | grep -oP '"tag_name": "\K[^"]+')
          VERSION=${TAG#v}
          URL="https://github.com/orhun/git-cliff/releases/download/${TAG}/git-cliff-${VERSION}-${TRIPLE}.tar.gz"
          echo "Downloading $URL"
          curl -sL "$URL" | tar xz -C /usr/local/bin --strip-components=1 "git-cliff-${VERSION}/git-cliff"
          git cliff --version

      - name: Generate release notes
        run: |
          set -euo pipefail
          git cliff --latest --strip header --output /tmp/release-notes.md
          echo "----- /tmp/release-notes.md (first 30 lines) -----"
          head -30 /tmp/release-notes.md
          echo "----- ($(wc -l < /tmp/release-notes.md) lines total) -----"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
